<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Helper - Прохождение тестов</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .test-card { transition: all 0.3s; }
    .test-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <h1 class="text-4xl font-bold text-center mb-4">Доступные тесты</h1>
    <p class="text-gray-400 text-center mb-12">Выберите тест для прохождения</p>

    <div id="test-list" class="grid gap-6">
      <!-- Тесты будут подгружаться сюда -->
    </div>
  </div>

  <script>
    // Загрузка списка тестов
    async function loadTestList() {
      try {
        const res = await fetch('../backend/files/index.json');
        const tests = await res.json();
        
        const container = document.getElementById('test-list');
        container.innerHTML = '';

        tests.forEach(filename => {
          const name = filename.replace('.json', '').replace(/_/g, ' ');
          
          const card = document.createElement('div');
          card.className = 'test-card bg-gray-900 border border-gray-700 rounded-3xl p-8 cursor-pointer hover:border-sky-500';
          card.innerHTML = `
            <div class="flex justify-between items-start">
              <div>
                <h3 class="text-2xl font-semibold mb-2">${name}</h3>
                <p class="text-gray-400 text-sm">Готовый тест</p>
              </div>
              <i class="fa-solid fa-arrow-right text-3xl text-gray-500"></i>
            </div>
          `;
          card.onclick = () => loadTest(filename);
          container.appendChild(card);
        });
      } catch(e) {
        console.error(e);
        document.getElementById('test-list').innerHTML = '<p class="text-red-400">Ошибка загрузки списка тестов</p>';
      }
    }

    // Загрузка выбранного теста
    async function loadTest(filename) {
      try {
        const res = await fetch(`../backend/files/${filename}`);
        const testData = await res.json();
        
        alert(`Тест "${filename}" загружен!\n\nВопросов: ${testData.questions ? testData.questions.length : 'много'}\n\n(Здесь будет полноценное прохождение теста)`);
        // Дальше можно сделать красивый экран прохождения
      } catch(e) {
        alert('Не удалось загрузить тест: ' + filename);
      }
    }

    // Запуск при загрузке страницы
    window.onload = loadTestList;
  </script>
</body>
</html>
